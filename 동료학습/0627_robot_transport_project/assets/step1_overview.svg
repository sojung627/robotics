<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 800 52px "Malgun Gothic", Arial, sans-serif; fill: #0f2a5f; }
      .subtitle { font: 700 28px "Malgun Gothic", Arial, sans-serif; fill: #1f2937; }
      .card-title { font: 800 23px "Malgun Gothic", Arial, sans-serif; fill: #0b4ea2; }
      .card-title-green { font: 800 23px "Malgun Gothic", Arial, sans-serif; fill: #15803d; }
      .card-title-orange { font: 800 23px "Malgun Gothic", Arial, sans-serif; fill: #c2410c; }
      .card-body { font: 600 19px "Malgun Gothic", Arial, sans-serif; fill: #111827; }
      .small { font: 600 17px "Malgun Gothic", Arial, sans-serif; fill: #334155; }
      .num { font: 800 22px Arial, sans-serif; fill: white; }
      .panel-title { font: 800 27px "Malgun Gothic", Arial, sans-serif; fill: #15803d; }
      .panel-title-orange { font: 800 27px "Malgun Gothic", Arial, sans-serif; fill: #c2410c; }
      .panel-text { font: 600 21px "Malgun Gothic", Arial, sans-serif; fill: #111827; }
      .arrow { fill: #111827; }
      .feedback { fill: none; stroke: #e11d48; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" markerWidth="24" markerHeight="20" refX="22" refY="10" orient="auto" markerUnits="userSpaceOnUse">
